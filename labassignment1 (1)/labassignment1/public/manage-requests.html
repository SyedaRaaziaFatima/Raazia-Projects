<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Book Requests</title>
</head>
<body>

<h2>Book Requests</h2>
<p id="msg"></p>
<table border="1" cellpadding="8">
    <tr>
        <th>#</th>
        <th>Book</th>
        <th>Student</th>
        <th>Roll No</th>
        <th>Date</th>
        <th>Status</th>
        <th>Action</th>
    </tr>
    <tbody id="tableData"></tbody>
</table>

<script src="js/app.js"></script>
<script>
checkLogin(true);

async function loadRequests() {
    let data = (await api('GET', '/api/requests/all')).data || [];
    document.getElementById("tableData").innerHTML = data.map((r, i) => `
        <tr>
            <td>${i + 1}</td>
            <td>${r.book?.title || "N/A"}</td>
            <td>${r.student?.name || "N/A"}</td>
            <td>${r.student?.rollNumber || "-"}</td>
            <td>${formatDate(r.requestDate)}</td>
            <td>${r.status}</td>
            <td>${r.status === "Pending" ? `<button onclick="accept('${r._id}')">Accept</button>
                <button onclick="reject('${r._id}')">Reject</button>` : "-"}</td>
        </tr>`).join('') || `<tr><td colspan="7">No requests yet</td></tr>`;
}

async function accept(id) { let res = await api('PUT','/api/requests/accept/'+id); if(res.ok) loadRequests(); else alert(res.data.error); }
async function reject(id) { let res = await api('PUT','/api/requests/reject/'+id); if(res.ok) loadRequests(); else alert(res.data.error); }

loadRequests();
</script>

</body>
</html>
