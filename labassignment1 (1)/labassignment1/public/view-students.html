<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>All Students</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav id="nav"></nav>

<div class="page">
  <h2>All Students</h2>
  <div id="msg" class="msg"></div>
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>Name</th>
          <th>Roll Number</th>
          <th>Email</th>
          <th>Phone</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="studentsTbody"></tbody>
    </table>
  </div>
</div>

<div class="modal-bg" id="modal">
  <div class="modal">
    <h3>Edit Student</h3>
    <input type="hidden" id="editId">
    <label>Name</label><input type="text" id="editName">
    <label>Roll Number</label><input type="text" id="editRoll">
    <label>Email</label><input type="email" id="editEmail">
    <label>Phone</label><input type="text" id="editPhone">
    <div style="display:flex; gap:8px; margin-top:12px">
      <button class="btn btn-blue" onclick="saveStudent()">Save</button>
      <button class="btn btn-red" onclick="closeModal()">Cancel</button>
    </div>
  </div>
</div>

<script src="js/app.js"></script>
<script>
checkLogin(true)
buildNav('view-students.html')
var allStudents=[]

async function loadStudents(){
  var res=await api('GET','/api/students/all')
  allStudents=res.data
  var tbody=document.getElementById('studentsTbody')
  tbody.innerHTML=''
  if(allStudents.length===0){ tbody.innerHTML='<tr><td colspan="6">No students found.</td></tr>'; return }
  allStudents.forEach((s,i)=>{
    tbody.innerHTML+=`<tr>
      <td>${i+1}</td>
      <td>${s.name}</td>
      <td>${s.rollNumber}</td>
      <td>${s.email}</td>
      <td>${s.phone||'-'}</td>
      <td>
        <button class="btn btn-blue" style="font-size:12px;padding:5px 10px" onclick="openEdit('${s._id}')">Edit</button>
        <button class="btn btn-red" onclick="deleteStudent('${s._id}')">Delete</button>
      </td>
    </tr>`
  })
}

function openEdit(id){
  var s=allStudents.find(x=>x._id===id)
  document.getElementById('editId').value=s._id
  document.getElementById('editName').value=s.name
  document.getElementById('editRoll').value=s.rollNumber
  document.getElementById('editEmail').value=s.email
  document.getElementById('editPhone').value=s.phone||''
  openModal()
}

async function saveStudent(){
  var id=document.getElementById('editId').value
  var res=await api('PUT','/api/students/update/'+id,{
    name:document.getElementById('editName').value,
    rollNumber:document.getElementById('editRoll').value,
    email:document.getElementById('editEmail').value,
    phone:document.getElementById('editPhone').value||undefined
  })
  if(res.ok){ closeModal(); showMsg('ok','Student updated!'); loadStudents() }
  else showMsg('err',res.data.error)
}

async function deleteStudent(id){
  if(!confirm('Delete this student?')) return
  var res=await api('DELETE','/api/students/delete/'+id)
  if(res.ok){ showMsg('ok','Student deleted!'); loadStudents() }
  else showMsg('err',res.data.error)
}

loadStudents()
</script>

</body>
</html>
