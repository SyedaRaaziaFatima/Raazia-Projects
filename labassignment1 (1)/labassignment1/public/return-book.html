<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Return Book</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav id="nav"></nav>

<div class="page">
  <h2>Return Book</h2>
  <div class="form-box">
    <div id="msg" class="msg"></div>
    <form id="returnForm">
      <label>Select Issue to Return</label>
      <select id="issueSelect" required>
        <option value="">-- Loading... --</option>
      </select>
      <button type="submit" class="btn btn-blue">Return Book</button>
    </form>
  </div>

  <h2>Return History</h2>
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>Book</th>
          <th>Student</th>
          <th>Roll No</th>
          <th>Issue Date</th>
          <th>Return Date</th>
          <th>Fine</th>
        </tr>
      </thead>
      <tbody id="returnTbody"></tbody>
    </table>
  </div>
</div>

<script src="js/app.js"></script>
<script>
checkLogin(true)
buildNav('return-book.html')

async function loadDropdown() {
  let res = await api('GET','/api/issues/all')
  let issues = res.data.filter(x=>x.status==='Issued')
  let select = document.getElementById('issueSelect')
  if(issues.length===0){ select.innerHTML='<option>No active issues</option>'; return }
  select.innerHTML='<option value="">-- Select Issue --</option>'
  issues.forEach(x=>{
    select.innerHTML+=`<option value="${x._id}">${x.book?.title||'?'} - ${x.student?.name||'?'} (${formatDate(x.issueDate)})</option>`
  })
}

async function loadHistory() {
  let res = await api('GET','/api/returns/history')
  let tbody=document.getElementById('returnTbody')
  tbody.innerHTML=''
  if(res.data.length===0){ tbody.innerHTML='<tr><td colspan="7">No returns yet.</td></tr>'; return }
  res.data.forEach((r,i)=>{
    tbody.innerHTML+=`<tr>
      <td>${i+1}</td>
      <td>${r.book?.title||'N/A'}</td>
      <td>${r.student?.name||'N/A'}</td>
      <td>${r.student?.rollNumber||'-'}</td>
      <td>${formatDate(r.issueDate)}</td>
      <td>${r.returnDate?formatDate(r.returnDate):'-'}</td>
      <td>${r.fine>0?'PKR '+r.fine:'-'}</td>
    </tr>`
  })
}

document.getElementById('returnForm').onsubmit=async function(e){
  e.preventDefault()
  let id=document.getElementById('issueSelect').value
  if(!id){ showMsg('err','Please select an issue first'); return }
  let res=await api('PUT','/api/returns/return/'+id)
  if(res.ok){ showMsg('ok','Book returned!'+(res.data.issue?.fine>0?' Fine: PKR '+res.data.issue.fine:'')); loadDropdown(); loadHistory() }
  else showMsg('err',res.data.error)
}

loadDropdown()
loadHistory()
</script>

</body>
</html>
