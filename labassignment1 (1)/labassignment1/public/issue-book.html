<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Issue Book</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav id="nav"></nav>

<div class="page">
    <h2>Issue Book to Student</h2>

    <div class="form-box">
        <div id="msg" class="msg"></div>

        <form id="issueForm">
            <label>Select Book</label>
            <select id="bookSelect" required>
                <option value="">-- Loading... --</option>
            </select>

            <label>Select Student</label>
            <select id="studentSelect" required>
                <option value="">-- Loading... --</option>
            </select>

            <button type="submit" class="btn btn-blue">Issue Book</button>
        </form>
    </div>

    <h2>All Issued Books</h2>
    <div class="table-wrap">
        <table>
            <thead>
                <tr>
                    <th>#</th>
                    <th>Book</th>
                    <th>Student</th>
                    <th>Roll No</th>
                    <th>Issue Date</th>
                    <th>Due Date</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody id="issuedTbody"></tbody>
        </table>
    </div>
</div>

<script src="js/app.js"></script>
<script>
checkLogin(true);
buildNav('issue-book.html');

async function loadDropdowns() {
    var booksResult = await api('GET','/api/books/all');
    var studentsResult = await api('GET','/api/students/all');

    var bookSelect = document.getElementById('bookSelect');
    bookSelect.innerHTML = '<option value="">-- Select Book --</option>';
    for(var i=0; i<booksResult.data.length; i++) {
        var book = booksResult.data[i];
        if(book.quantity > 0) {
            bookSelect.innerHTML += '<option value="'+book._id+'">'+book.title+' ('+book.quantity+' left)</option>';
        }
    }

    var studentSelect = document.getElementById('studentSelect');
    studentSelect.innerHTML = '<option value="">-- Select Student --</option>';
    for(var j=0; j<studentsResult.data.length; j++) {
        var student = studentsResult.data[j];
        studentSelect.innerHTML += '<option value="'+student._id+'">'+student.name+' - '+student.rollNumber+'</option>';
    }
}

async function loadIssuedBooks() {
    var result = await api('GET','/api/issues/all');
    var rows = '';
    for(var i=0; i<result.data.length; i++) {
        var x = result.data[i];
        var dueDate = new Date(new Date(x.issueDate).getTime() + 7*24*60*60*1000);
        rows += '<tr>'+
            '<td>'+(i+1)+'</td>'+
            '<td>'+(x.book ? x.book.title : 'N/A')+'</td>'+
            '<td>'+(x.student ? x.student.name : 'N/A')+'</td>'+
            '<td>'+(x.student ? x.student.rollNumber : '-')+'</td>'+
            '<td>'+formatDate(x.issueDate)+'</td>'+
            '<td>'+formatDate(dueDate)+'</td>'+
            '<td>'+statusBadge(x.status,x.issueDate)+'</td>'+
        '</tr>';
    }
    fillTable('issuedTbody', rows, 'No books issued yet.');
}

document.getElementById('issueForm').onsubmit = async function(e) {
    e.preventDefault();
    var bookId = document.getElementById('bookSelect').value;
    var studentId = document.getElementById('studentSelect').value;

    if(!bookId || !studentId) {
        showMsg('err','Please select both book and student.');
        return;
    }

    var res = await api('POST','/api/issues/issue',{bookId: bookId, studentId: studentId});
    if(res.ok) {
        showMsg('ok','Book issued successfully!');
        loadDropdowns();
        loadIssuedBooks();
    } else {
        showMsg('err', res.data.error);
    }
};

loadDropdowns();
loadIssuedBooks();
</script>

</body>
</html>
