<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><title>Request Book</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<nav id="nav"></nav>
<div class="page">
  <h2>Request a Book</h2>
  <div class="form-box" style="margin-bottom:28px">
    <div id="msg" class="msg"></div>
    <form id="reqForm">
      <label>Search Book by Name *</label>
      <input id="bookSearch" placeholder="Type book name..." autocomplete="off" required>
      <div id="bookList" style="border:1px solid #ccc;border-radius:4px;background:#fff;display:none;max-height:160px;overflow-y:auto;margin-top:-10px;margin-bottom:14px"></div>
      <input type="hidden" id="bookSel">
      <div id="selectedBook" style="font-size:13px;color:#27ae60;margin-bottom:10px"></div>
      <button class="btn btn-blue">Send Request</button>
    </form>
  </div>
  </table></div>
  <h2>My Issued Books</h2>
  <div class="table-wrap"><table>
    <thead><tr><th>#</th><th>Book</th><th>Issue Date</th><th>Due Date</th><th>Status</th><th>Fine</th></tr></thead>
    <tbody id="myTbody"></tbody>
  </table></div>
</div>
<script src="js/app.js"></script>
<script>
  guard(false);
  if (getRole() === 'Admin') location.href = 'manage-requests.html';
  buildNav('request-issue.html');

  let stuId = getStudentId();

  // Auto-resolve studentId by username if missing
  const resolveStudent = async () => {
    if (stuId) return;
    const { data } = await api('GET', '/api/students/all');
    const uname = getUsername().toLowerCase();
    const match = data.find(s =>
      s.name?.toLowerCase().includes(uname) ||
      s.rollNumber?.toLowerCase().includes(uname) ||
      s.email?.toLowerCase().startsWith(uname)
    );
    if (match) {
      stuId = match._id;
      localStorage.setItem('studentId', stuId);
      await api('POST', '/api/users/link-student', { username: getUsername(), studentId: stuId });
    }
  };

  let allBooks = [];

  const loadBooks = async () => {
    const { data } = await api('GET', '/api/books/all');
    allBooks = data.filter(b => b.quantity > 0);
  };

  bookSearch.addEventListener('input', () => {
    const q = bookSearch.value.toLowerCase().trim();
    if (!q) { bookList.style.display = 'none'; return; }
    const matches = allBooks.filter(b => b.title.toLowerCase().includes(q) || b.author.toLowerCase().includes(q));
    if (!matches.length) { bookList.innerHTML = '<div style="padding:8px 12px;color:#888;font-size:13px">No books found</div>'; bookList.style.display = 'block'; return; }
    bookList.innerHTML = matches.map(b =>
      `<div onclick="selectBook('${b._id}','${b.title} by ${b.author}')"
        style="padding:8px 12px;cursor:pointer;font-size:13px;border-bottom:1px solid #eee"
        onmouseover="this.style.background='#f0f0f0'" onmouseout="this.style.background=''"
       >${b.title} <span style="color:#888">by ${b.author}</span> <span style="color:#27ae60">(${b.quantity} left)</span></div>`
    ).join('');
    bookList.style.display = 'block';
  });

  function selectBook(id, label) {
    bookSel.value = id;
    bookSearch.value = label;
    selectedBook.textContent = '✓ ' + label;
    bookList.style.display = 'none';
  }

  document.addEventListener('click', e => { if (!e.target.closest('#reqForm')) bookList.style.display = 'none'; });

  const loadMyRequests = async () => {
    const { data } = await api('GET', '/api/requests/all');
    const mine = data.filter(r => r.student && r.student._id === stuId);
    fillTable('reqTbody', mine.map((r,i) => {
      const color = r.status==='Approved'?'#27ae60':r.status==='Rejected'?'#e74c3c':'#e67e22';
      return `<tr><td>${i+1}</td><td>${r.book?.title||'N/A'}</td><td>${fmt(r.requestDate)}</td>
        <td><span class="badge" style="background:${color};color:#fff">${r.status}</span></td></tr>`;
    }), 'No requests yet.');
  };

  const loadMine = async () => {
    if (!stuId) { fillTable('myTbody',[],'No student profile linked. Contact admin.'); return; }
    const { data } = await api('GET', '/api/users/my-books/' + stuId);
    fillTable('myTbody', data.map((x,i) => `<tr>
      <td>${i+1}</td><td>${x.book?.title||'N/A'}</td>
      <td>${fmt(x.issueDate)}</td><td>${fmt(+new Date(x.issueDate)+604800000)}</td>
      <td>${badge(x.status,x.issueDate)}</td><td>${x.fine>0?'PKR '+x.fine:'-'}</td>
    </tr>`), 'No books issued yet.');
  };

  document.getElementById('reqForm').onsubmit = async e => {
    e.preventDefault();
    if (!bookSel.value) return showMsg('err', 'Please select a book from the list');
    if (!stuId) return showMsg('err', 'Student profile not linked. Contact admin.');
    const { ok, data } = await api('POST', '/api/requests/create', { bookId: bookSel.value, studentId: stuId });
    showMsg(ok ? 'ok' : 'err', ok ? 'Request sent! Waiting for admin approval.' : data.error);
    if (ok) { bookSel.value=''; bookSearch.value=''; selectedBook.textContent=''; loadMyRequests(); }
  };

  resolveStudent().then(() => { loadBooks(); loadMyRequests(); loadMine(); });
</script>
</body></html>
