<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Book</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav id="nav"></nav>

<div class="page">
    <h2>Add New Book</h2>
    <div class="form-box">
        <div id="msg" class="msg"></div>
        <form id="addBookForm">
            <label>Book Title</label>
            <input type="text" id="title" placeholder="Enter book title" required>

            <label>Author</label>
            <input type="text" id="author" placeholder="Enter author name" required>

            <label>Category</label>
            <select id="category" required>
                <option value="">-- Select --</option>
                <option value="Science">Science</option>
                <option value="IT">IT</option>
                <option value="Math">Math</option>
                <option value="Fiction">Fiction</option>
                <option value="Other">Other</option>
            </select>

            <label>Quantity</label>
            <input type="number" id="quantity" placeholder="Number of copies" min="1" required>

            <button type="submit" class="btn btn-blue">Add Book</button>
        </form>
    </div>
</div>

<script src="js/app.js"></script>
<script>
checkLogin(true);
buildNav('add-book.html');

document.getElementById('addBookForm').onsubmit = async e => {
    e.preventDefault();
    const res = await api('POST', '/api/books/add', {
        title: document.getElementById('title').value,
        author: document.getElementById('author').value,
        category: document.getElementById('category').value,
        quantity: Number(document.getElementById('quantity').value)
    });
    if(res.ok) {
        showMsg('ok','Book added!');
        e.target.reset();
    } else showMsg('err', res.data.error);
};
</script>

</body>
</html>
