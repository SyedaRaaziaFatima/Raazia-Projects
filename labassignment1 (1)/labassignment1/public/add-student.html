<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Student</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav id="nav"></nav>

<div class="page">
    <h2>Add New Student</h2>
    <div class="form-box">
        <div id="msg" class="msg"></div>
        <form id="addStudentForm">
            <label>Full Name</label>
            <input type="text" id="name" placeholder="Student full name" required>

            <label>Roll Number</label>
            <input type="text" id="rollNumber" placeholder="FA21-BCS-001" required>

            <label>Email</label>
            <input type="email" id="email" placeholder="student@email.com" required>

            <label>Phone (optional)</label>
            <input type="text" id="phone" placeholder="Phone number">

            <button type="submit" class="btn btn-blue">Add Student</button>
        </form>
    </div>
</div>

<script src="js/app.js"></script>
<script>
checkLogin(true);
buildNav('add-student.html');

document.getElementById('addStudentForm').onsubmit = async e => {
    e.preventDefault();
    const res = await api('POST', '/api/students/add', {
        name: document.getElementById('name').value,
        rollNumber: document.getElementById('rollNumber').value,
        email: document.getElementById('email').value,
        phone: document.getElementById('phone').value || undefined
    });
    if(res.ok) {
        showMsg('ok','Student added!');
        e.target.reset();
    } else showMsg('err', res.data.error);
};
</script>

</body>
</html>
