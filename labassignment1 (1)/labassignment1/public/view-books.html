<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>All Books</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav id="nav"></nav>

<div class="page">
  <h2>All Books</h2>
  <div id="msg" class="msg"></div>
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>Title</th>
          <th>Author</th>
          <th>Category</th>
          <th>Quantity</th>
          <th id="actionHead"></th>
        </tr>
      </thead>
      <tbody id="booksTbody"></tbody>
    </table>
  </div>
</div>

<div class="modal-bg" id="modal">
  <div class="modal">
    <h3>Edit Book</h3>
    <input type="hidden" id="editId">
    <label>Title</label><input type="text" id="editTitle">
    <label>Author</label><input type="text" id="editAuthor">
    <label>Category</label>
    <select id="editCategory">
      <option value="Science">Science</option>
      <option value="IT">IT</option>
      <option value="Math">Math</option>
      <option value="Fiction">Fiction</option>
      <option value="Other">Other</option>
    </select>
    <label>Quantity</label><input type="number" id="editQty" min="0">
    <div style="display:flex; gap:8px; margin-top:12px">
      <button class="btn btn-blue" onclick="saveBook()">Save</button>
      <button class="btn btn-red" onclick="closeModal()">Cancel</button>
    </div>
  </div>
</div>

<script src="js/app.js"></script>
<script>
checkLogin(false)
buildNav('view-books.html')
var isAdmin=getRole()==='Admin'
if(isAdmin) document.getElementById('actionHead').textContent='Actions'
var allBooks=[]

async function loadBooks(){
  var res=await api('GET','/api/books/all')
  allBooks=res.data
  var tbody=document.getElementById('booksTbody')
  tbody.innerHTML=''
  if(allBooks.length===0){ tbody.innerHTML='<tr><td colspan="6">No books found.</td></tr>'; return }
  allBooks.forEach((b,i)=>{
    let actions=isAdmin?`<button class="btn btn-blue" style="font-size:12px;padding:5px 10px" onclick="openEdit('${b._id}')">Edit</button> <button class="btn btn-red" onclick="deleteBook('${b._id}')">Delete</button>`:''
    tbody.innerHTML+=`<tr>
      <td>${i+1}</td>
      <td>${b.title}</td>
      <td>${b.author}</td>
      <td>${b.category}</td>
      <td>${b.quantity}</td>
      <td>${actions}</td>
    </tr>`
  })
}

function openEdit(id){
  var b=allBooks.find(x=>x._id===id)
  document.getElementById('editId').value=b._id
  document.getElementById('editTitle').value=b.title
  document.getElementById('editAuthor').value=b.author
  document.getElementById('editCategory').value=b.category
  document.getElementById('editQty').value=b.quantity
  openModal()
}

async function saveBook(){
  var id=document.getElementById('editId').value
  var res=await api('PUT','/api/books/update/'+id,{
    title:document.getElementById('editTitle').value,
    author:document.getElementById('editAuthor').value,
    category:document.getElementById('editCategory').value,
    quantity:Number(document.getElementById('editQty').value)
  })
  if(res.ok){ closeModal(); showMsg('ok','Book updated!'); loadBooks() }
  else showMsg('err',res.data.error)
}

async function deleteBook(id){
  if(!confirm('Delete this book?')) return
  var res=await api('DELETE','/api/books/delete/'+id)
  if(res.ok){ showMsg('ok','Book deleted!'); loadBooks() }
  else showMsg('err',res.data.error)
}

loadBooks()
</script>

</body>
</html>
