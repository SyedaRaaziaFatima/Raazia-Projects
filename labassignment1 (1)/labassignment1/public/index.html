<script>

// ✅ Get user from localStorage
function getUser() {
    return JSON.parse(localStorage.getItem('user'));
}

// Initialize dashboard
async function initDashboard() {
    const user = getUser();

    // ❌ Not logged in
    if (!user) {
        window.location.href = 'login.html';
        return;
    }

    buildNav('index.html');

    // ================= ADMIN =================
    if (user.role === 'Admin') {

        document.getElementById('adminView').style.display = 'block';
        document.getElementById('pageTitle').textContent = 'Admin Dashboard';

        // Stats
        const statsRes = await api('GET', '/api/dashboard/stats');
        if (statsRes.data) {
            ['totalBooks','availableBooks','issuedBooks','totalStudents','overdueBooks']
            .forEach(id => {
                document.getElementById(id).textContent = statsRes.data[id] || 0;
            });
        }

        // Issued books
        const issuesRes = await api('GET','/api/issues/all');

        fillTable('issuedTbody', issuesRes.data.map((x,i) => {
            const due = new Date(new Date(x.issueDate).getTime() + 7*24*60*60*1000);

            return `<tr>
                <td>${i+1}</td>
                <td>${x.book?.title || 'N/A'}</td>
                <td>${x.student?.name || 'N/A'}</td>
                <td>${x.student?.rollNumber || '-'}</td>
                <td>${formatDate(x.issueDate)}</td>
                <td>${formatDate(due)}</td>
                <td>${statusBadge(x.status, x.issueDate)}</td>
            </tr>`;
        }), 'No books issued yet.');

    }

    // ================= STUDENT =================
    else {

        document.getElementById('studentView').style.display = 'block';
        document.getElementById('pageTitle').textContent = 'My Books';
        document.getElementById('stuName').textContent = user.username;

        const myBooksRes = await api('GET','/api/users/my-books/' + user.studentId);

        fillTable('myBooksTbody', myBooksRes.data.map((x,i) => {
            const due = new Date(new Date(x.issueDate).getTime() + 7*24*60*60*1000);

            return `<tr>
                <td>${i+1}</td>
                <td>${x.book?.title || 'N/A'}</td>
                <td>${formatDate(x.issueDate)}</td>
                <td>${formatDate(due)}</td>
                <td>${statusBadge(x.status, x.issueDate)}</td>
                <td>${x.fine > 0 ? 'PKR ' + x.fine : '-'}</td>
            </tr>`;
        }), 'No books issued yet.');
    }
}

// Helper: fill table
function fillTable(tbodyId, rows, emptyMessage) {
    const tbody = document.getElementById(tbodyId);
    tbody.innerHTML = rows.length
        ? rows.join('')
        : `<tr><td colspan="7" style="text-align:center">${emptyMessage}</td></tr>`;
}

// Run
initDashboard();

</script>
