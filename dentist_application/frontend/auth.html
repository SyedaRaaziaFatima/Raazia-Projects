<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login / Register - DentalCare</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-page">
    <button id="darkModeToggle" class="dark-mode-btn" title="Toggle Dark Mode" style="position: fixed; top: 1rem; right: 1rem; z-index: 1001;">🌙</button>
    <div class="auth-container">
        <div class="auth-card">
            <!-- Tabs -->
            <div class="auth-tabs">
                <button class="tab-btn active" data-tab="login">Login</button>
                <button class="tab-btn" data-tab="register">Register</button>
            </div>

            <!-- Login Form -->
            <div id="login" class="auth-form active">
                <h2>Welcome Back</h2>
                <p class="form-subtitle">Login to your DentalCare account</p>
                
                <form id="loginForm">
                    <div class="form-group">
                        <label for="loginEmail">Email Address</label>
                        <input type="email" id="loginEmail" name="email" required placeholder="you@example.com">
                    </div>

                    <div class="form-group">
                        <label for="loginPassword">Password</label>
                        <input type="password" id="loginPassword" name="password" required placeholder="••••••••">
                    </div>

                    <div class="form-group">
                        <label for="loginRole">I am a:</label>
                        <select id="loginRole" name="role" required>
                            <option value="">Select your role</option>
                            <option value="patient">Patient</option>
                            <option value="doctor">Doctor</option>
                        </select>
                    </div>

                    <button type="submit" class="btn btn-primary btn-full">Login</button>
                    <div id="loginError" class="error-message"></div>
                    <div id="loginSuccess" class="success-message"></div>
                </form>
            </div>

            <!-- Register Form -->
            <div id="register" class="auth-form">
                <h2>Create Account</h2>
                <p class="form-subtitle">Join DentalCare today</p>
                
                <form id="registerForm">
                    <div class="form-group">
                        <label for="registerName">Full Name</label>
                        <input type="text" id="registerName" name="name" required placeholder="John Doe">
                    </div>

                    <div class="form-group">
                        <label for="registerEmail">Email Address</label>
                        <input type="email" id="registerEmail" name="email" required placeholder="you@example.com">
                    </div>

                    <div class="form-group">
                        <label for="registerPassword">Password</label>
                        <input type="password" id="registerPassword" name="password" required placeholder="••••••••">
                    </div>

                    <div class="form-group">
                        <label for="registerPhone">Phone Number</label>
                        <input type="tel" id="registerPhone" name="phone" required placeholder="(555) 123-4567">
                    </div>

                    <div class="form-group">
                        <label for="registerRole">Register as:</label>
                        <select id="registerRole" name="role" required>
                            <option value="">Select your role</option>
                            <option value="patient">Patient</option>
                            <option value="doctor">Doctor</option>
                        </select>
                    </div>

                    <button type="submit" class="btn btn-primary btn-full">Create Account</button>
                    <div id="registerError" class="error-message"></div>
                    <div id="registerSuccess" class="success-message"></div>
                </form>
            </div>

            <div class="auth-footer">
                <a href="index.html" class="back-link">← Back to Home</a>
            </div>
        </div>
    </div>

    <script src="js/main.js"></script>
</body>
</html>
